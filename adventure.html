.adventure-container { max-width: 680px; margin: 0 auto; }

.scene-block {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 36px 32px;
  box-shadow: 0 4px 20px rgba(169, 132, 70, 0.03);
  margin-bottom: 24px;
}

.scene-label {
  font-size: 11px; color: var(--text-dim); letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 16px;
}

.scene-text {
  font-size: 15px; color: var(--text); line-height: 2;
  margin-bottom: 28px;
}

.scene-text em { color: var(--accent); font-style: normal; }

.choices { display: flex; flex-direction: column; gap: 10px; }

.choice-btn {
  display: block; width: 100%; text-align: left;
  padding: 14px 20px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); font-size: 14px; color: var(--text);
  cursor: pointer; transition: all 0.2s; font-family: inherit; line-height: 1.6;
}
.choice-btn:hover {
  border-color: var(--accent-dim); background: var(--bg-card-hover);
  transform: translateX(4px);
}

.log-divider {
  text-align: center; padding: 20px 0; color: var(--text-dim);
  font-size: 13px; letter-spacing: 1px;
}

.log-entry {
  padding: 10px 16px; margin-bottom: 6px;
  border-left: 2px solid var(--border); font-size: 13px; color: var(--text-dim);
  line-height: 1.7;
}

/* 结局特殊样式 */
.ending-good { border-left-color: #8bab6a; }
.ending-neutral { border-left-color: var(--accent-dim); }
.ending-dark { border-left-color: var(--accent-physical); }

.reset-btn {
  display: inline-block; padding: 10px 32px;
  background: var(--accent); color: #fff; border: none;
  border-radius: var(--radius); font-size: 13px; cursor: pointer;
  font-family: inherit; letter-spacing: 1px; transition: opacity 0.2s;
  margin-top: 8px;
}
.reset-btn:hover { opacity: 0.85; }

.side-stats {
  display: flex; gap: 20px; margin-bottom: 24px; font-size: 12px;
  color: var(--text-dim);
}
.side-stats span { font-weight: 600; }
.stat-physical { color: var(--accent-physical); }
.stat-magic { color: var(--accent-magic); }
.stat-research { color: var(--accent-research); }

const scenes = {

  // ====== 档案线 ======
  archive_intro: {

    text: '档案室比你想的要小得多。一个头发花白的学者从堆积如山的卷宗后面抬起头来，眼镜片厚得像玻璃瓶底。\n\n"新来的助手？好极了。我正在整理过去三个月的暗界生物目击记录，但数据太乱了——光凭这些我无法判断裂隙的活动趋势。"\n\n他向你展示了两叠文件：一叠是巡逻队的目击报告，笔迹潦草；另一叠是能量探测仪的数据记录，满是奇怪的符号。',

    ]

    ending: 'good',
    choices: [{ text: '回到起点，再次踏上旅程', next: 'start' }]
  },
  ending_forge_neutral: {

// ====== 状态 ======
let stats = { physical: 0, magic: 0, research: 0 };
let log = [];
let currentScene = 'start';

const sceneArea = document.getElementById('scene-area');
const logArea = document.getElementById('log-area');
const statsBar = document.getElementById('stats-bar');

function updateStats() {
  document.getElementById('stat-p').textContent = stats.physical;
  document.getElementById('stat-m').textContent = stats.magic;
  document.getElementById('stat-r').textContent = stats.research;
}

function renderScene(id) {
  const s = scenes[id];
  if (!s) return;

  // 更新统计
  if (s.stat) {
    stats[s.stat]++;
    updateStats();
  }

  // 记录日志（非结局和初始场景）
  if (id !== 'start' && !id.startsWith('ending_')) {
    log.push({ label: s.label, text: s.text.substring(0, 150) + '…' });
  }

  statsBar.style.display = 'flex';

  let endingClass = '';
  if (s.ending === 'good') endingClass = 'ending-good';
  else if (s.ending === 'neutral') endingClass = 'ending-neutral';
  else if (s.ending === 'dark') endingClass = 'ending-dark';

  const choicesHTML = s.choices.map(c => {
    if (c.next === 'start') {
      return `<button class="choice-btn" onclick="resetAdventure()" style="text-align:center;color:var(--accent);">${c.text}</button>`;
    }
    return `<button class="choice-btn" onclick="navigateTo('${c.next}')">${c.text}</button>`;
  }).join('');

  sceneArea.innerHTML = `
    <div class="scene-block ${endingClass}">
      <div class="scene-label">${s.label}</div>
      <div class="scene-text">${s.text.replace(/\n/g, '<br>')}</div>
      <div class="choices">${choicesHTML}</div>
    </div>
  `;

  // 渲染日志
  if (log.length > 0) {
    logArea.innerHTML = `
      <div class="log-divider">—— 历险足迹 ——</div>
      ${log.map(l => `<div class="log-entry">${l.label}: ${l.text}</div>`).join('')}
    `;
  }
}

function navigateTo(id) {
  currentScene = id;
  renderScene(id);
}

function resetAdventure() {
  stats = { physical: 0, magic: 0, research: 0 };
  log = [];
  currentScene = 'start';
  updateStats();
  logArea.innerHTML = '';
  renderScene('start');
}

// 启动
renderScene('start');
</script>
