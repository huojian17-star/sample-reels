<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title data-i18n="t-title">测试</title>
<style>body{font-family:Georgia,serif;max-width:600px;margin:40px auto;padding:20px;background:#faf9f6}h1{color:#333}p{color:#666}</style></head>
<body>
<h1 data-i18n="t-h1">i18n 引擎测试</h1>
<p data-i18n="t-p1">如果右上角有 EN 按钮，外部 i18n.js 加载成功。</p>
<p data-i18n="t-p2">点 EN 看能否切换英文。</p>
<script src="i18n.js"></script>

<script>
// i18n
(function(){
var L=localStorage.getItem('site-lang')||'zh';
var M={};
M['nav-about']={zh:'关于',en:'About'};M['nav-bilibili']={zh:'B站',en:'Bilibili'};
M['nav-worldbuilding']={zh:'设定集',en:'World'};M['nav-novel']={zh:'小说',en:'Novel'};
M['nav-game-design']={zh:'游戏设计',en:'Game Design'};M['nav-game-analysis']={zh:'游戏拆解',en:'Analysis'};
M['nav-script-analysis']={zh:'文案拆解',en:'Scripts'};M['nav-gaming']={zh:'游戏经历',en:'Gaming'};
M['nav-brand']={zh:'BEST-辣椒',en:'BEST-Chili'};M['lang-label']={zh:'EN',en:'中'};
M['back-home']={zh:'← 返回首页',en:'← Back Home'};
M['footer-text']={zh:'BEST-辣椒 © 2026',en:'BEST-Chili © 2026'};
M['t-title']={zh:'测试',en:'Test'};M['t-h1']={zh:'i18n 引擎测试',en:'i18n Engine Test'};
M['t-p1']={zh:'如果右上角有 EN 按钮，外部加载成功。',en:'If EN button appears, external load works.'};
M['t-p2']={zh:'点 EN 看能否切换英文。',en:'Click EN to toggle English.'};
function t(k){var e=M[k];return e?e[L]||e['zh']||k:k;}
function ap(){var els=document.querySelectorAll('[data-i18n]');
for(var i=0;i<els.length;i++){var k=els[i].getAttribute('data-i18n');els[i].textContent=t(k);}
var btn=document.getElementById('lang-toggle');if(btn)btn.textContent=t('lang-label');
var ti=document.querySelector('title[data-i18n]');if(ti)document.title=t(ti.getAttribute('data-i18n'));
localStorage.setItem('site-lang',L);}
function tg(){L=L==='zh'?'en':'zh';ap();}
document.addEventListener('DOMContentLoaded',function(){
var btn=document.createElement('button');btn.id='lang-toggle';btn.textContent=t('lang-label');
btn.style.cssText='position:fixed;top:12px;right:20px;z-index:9999;background:var(--bg-card,#fff);border:1px solid var(--border,#ccc);padding:4px 12px;border-radius:4px;font-size:12px;color:var(--text-dim,#666);cursor:pointer;font-family:inherit;letter-spacing:1px;box-shadow:0 2px 8px rgba(0,0,0,.06);';
btn.onclick=tg;document.body.appendChild(btn);if(L==='en')ap();});
})();
</script>
</body>
</html>
